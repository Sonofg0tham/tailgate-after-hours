name: CI

# Run on every pull request that targets main, and again on main itself after
# a merge, so a broken change can never sit unnoticed on the default branch.
# Also runs on PRs targeting phase-* branches, including the repository's
# codex/ prefix, so a stacked phase PR gets the same gate instead of arriving
# at main untested.
on:
  pull_request:
    branches: [main, 'phase-*', 'codex/phase-*']
  push:
    branches: [main]

# The checks only read repository contents. Keep the workflow token at the
# narrowest permission level so a compromised dependency cannot write back.
permissions:
  contents: read

# If new commits land on the same branch while a run is in flight, cancel the
# older run. Saves minutes and always tests the latest code.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The job is named "checks" because branch protection on main requires a
  # status check with exactly that name. Rename it and every PR stops merging.
  checks:
    name: checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Pull the repository onto the runner. fetch-depth 0 gets the full git
      # history so the secret scan can inspect every commit, not just the tip.
      - name: Check out the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # Install Node 22 (the current LTS) and cache the npm downloads between
      # runs so installs are fast.
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      # Install exactly what the lockfile pins. Fails if package.json and the
      # lockfile disagree, which keeps the build reproducible.
      - name: Install dependencies
        run: npm ci

      # The same quality gates you run locally, now enforced on every PR.
      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # Compile the typed Vercel config and assert the response-header route
      # survives the SDK's export handling. A type check alone cannot prove it.
      - name: Validate Vercel security headers
        run: npm run validate:vercel

      # Scan the whole git history for leaked secrets. The upstream image is
      # pinned by immutable digest, so no unchecked executable is downloaded.
      - name: Secret scan (gitleaks)
        run: >-
          docker run --rm
          --volume "$GITHUB_WORKSPACE:/repo:ro"
          ghcr.io/gitleaks/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
          git --redact --no-banner /repo

      # Build the production bundle and attach it as a downloadable zip.
      # Because Vite builds with base './', the dist/ contents run from any
      # directory — download the artefact from the Actions run, upload it to
      # itch.io as an HTML5 game, done. Nothing extra to configure.
      - name: Build production bundle
        run: npm run build

      - name: Upload itch.io-ready bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tailgate-after-hours-web
          path: dist/
          if-no-files-found: error
