<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailgate: After Hours</title>
    <style>
      /* Colours are written onto :root at startup by applyPaletteToCss()
         (src/config/palette.ts) — this file only ever references the
         resulting --base/--text/--alarm custom properties, never a
         hardcoded hex. */
      html, body {
        margin: 0;
        height: 100%;
        background: var(--base, #0e1116);
        overflow: hidden;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      canvas {
        display: block;
      }
      #hud {
        position: fixed;
        top: 8px;
        left: 8px;
        color: var(--text, #c7cdd4);
        font-family: 'IBM Plex Mono', monospace;
        font-size: 13px;
        line-height: 1.5;
        white-space: pre;
        pointer-events: none;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
      }
      #suspicion {
        position: fixed;
        top: 8px;
        right: 8px;
        width: 160px;
        height: 12px;
        border: 1px solid var(--text, #c7cdd4);
        pointer-events: none;
      }
      #suspicion-fill {
        height: 100%;
        width: 0%;
        background: var(--amber, #ffb000);
        transition: width 0.1s linear, background-color 0.2s linear;
      }
      #detained-flash {
        position: fixed;
        inset: 0;
        background: var(--alarm, #ff3b30);
        opacity: 0;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 32px;
        letter-spacing: 0.2em;
        color: white;
        transition: opacity 0.15s linear;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"></div>
    <div id="suspicion"><div id="suspicion-fill"></div></div>
    <div id="detained-flash">DETAINED</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
