<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailgate: After Hours</title>
    <style>
      /* Colours are written onto :root at startup by applyPaletteToCss()
         (src/config/palette.ts) — this file only ever references the
         resulting --base/--text/--alarm custom properties, never a
         hardcoded hex. */
      html, body {
        margin: 0;
        height: 100%;
        background: var(--base, #0e1116);
        overflow: hidden;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      canvas {
        display: block;
      }
      :root {
        --hud-scale: 1;
      }
      #hud {
        position: fixed;
        top: 8px;
        left: 8px;
        color: var(--text, #c7cdd4);
        font-family: 'IBM Plex Mono', monospace;
        font-size: calc(13px * var(--hud-scale));
        line-height: 1.5;
        white-space: pre;
        pointer-events: none;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
      }
      #suspicion {
        position: fixed;
        top: 8px;
        right: 8px;
        width: 160px;
        height: 12px;
        border: 1px solid var(--text, #c7cdd4);
        pointer-events: none;
      }
      #suspicion-fill {
        height: 100%;
        width: 0%;
        background: var(--amber, #ffb000);
        transition: width 0.1s linear, background-color 0.2s linear;
      }
      #detained-flash {
        position: fixed;
        inset: 0;
        background: var(--alarm, #ff3b30);
        opacity: 0;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 32px;
        letter-spacing: 0.2em;
        color: white;
        transition: opacity 0.15s linear;
      }

      /* The Engagement Report end-screen: the signature one-page pentest
         report, a plain terminal document in IBM Plex Mono on near-black,
         clearance amber for structure, alarm red reserved for what went
         wrong. Hidden until the mission ends (exfil or dawn). */
      #report {
        position: fixed;
        inset: 0;
        display: none;
        align-items: flex-start;
        justify-content: center;
        overflow-y: auto;
        padding: 32px 16px;
        background: rgba(8, 10, 13, 0.94);
        font-family: 'IBM Plex Mono', monospace;
        color: var(--text, #c7cdd4);
        z-index: 100;
      }
      #report.visible {
        display: flex;
      }
      .report-sheet {
        width: 100%;
        max-width: 680px;
        background: #12161c;
        border: 1px solid rgba(199, 205, 212, 0.18);
        border-top: 3px solid var(--amber, #ffb000);
        padding: 28px 32px 24px;
        line-height: 1.55;
        font-size: 13px;
      }
      .report-sheet h1 {
        margin: 0 0 2px;
        font-size: 15px;
        letter-spacing: 0.24em;
        color: var(--amber, #ffb000);
        font-weight: 600;
      }
      .report-meta {
        color: rgba(199, 205, 212, 0.65);
        font-size: 12px;
        margin-bottom: 4px;
      }
      .report-dawn {
        margin: 14px 0 4px;
        padding: 8px 10px;
        border: 1px solid var(--alarm, #ff3b30);
        color: var(--alarm, #ff3b30);
        letter-spacing: 0.08em;
        font-size: 12px;
      }
      .report-rule {
        border: 0;
        border-top: 1px solid rgba(199, 205, 212, 0.18);
        margin: 16px 0;
      }
      .report-section-title {
        letter-spacing: 0.2em;
        font-size: 11px;
        color: rgba(199, 205, 212, 0.55);
        margin: 0 0 8px;
      }
      .report-rating {
        font-size: 30px;
        letter-spacing: 0.14em;
        font-weight: 600;
        margin: 2px 0 2px;
      }
      .report-rating[data-tone='good'] {
        color: var(--amber, #ffb000);
      }
      .report-rating[data-tone='bad'] {
        color: var(--alarm, #ff3b30);
      }
      .report-remark {
        color: rgba(199, 205, 212, 0.8);
        font-size: 12px;
        margin-bottom: 4px;
      }
      .report-finding {
        display: grid;
        grid-template-columns: 44px 84px 1fr;
        gap: 8px;
        margin-bottom: 8px;
        align-items: baseline;
      }
      .report-finding .ref {
        color: var(--amber, #ffb000);
      }
      .report-finding .sev {
        font-size: 11px;
        letter-spacing: 0.08em;
      }
      .report-finding .sev[data-sev='CRITICAL'],
      .report-finding .sev[data-sev='HIGH'] {
        color: var(--alarm, #ff3b30);
      }
      .report-finding .sev[data-sev='MEDIUM'] {
        color: var(--amber, #ffb000);
      }
      .report-finding .sev[data-sev='LOW'] {
        color: rgba(199, 205, 212, 0.6);
      }
      .report-detections div {
        margin-bottom: 4px;
      }
      .report-detections.flagged div {
        color: var(--alarm, #ff3b30);
      }
      .report-summary div {
        display: flex;
        justify-content: space-between;
        max-width: 320px;
      }
      .report-summary .k {
        color: rgba(199, 205, 212, 0.6);
      }
      #report-new-engagement {
        margin-top: 22px;
        padding: 10px 18px;
        background: transparent;
        border: 1px solid var(--amber, #ffb000);
        color: var(--amber, #ffb000);
        font-family: inherit;
        font-size: 12px;
        letter-spacing: 0.18em;
        cursor: pointer;
        transition: background-color 0.15s linear, color 0.15s linear;
      }
      #report-new-engagement:hover,
      #report-new-engagement:focus-visible {
        background: var(--amber, #ffb000);
        color: #12161c;
        outline: none;
      }
      #report-sign-out {
        margin-top: 22px;
        margin-left: 10px;
        padding: 10px 18px;
        background: transparent;
        border: 1px solid rgba(199, 205, 212, 0.45);
        color: rgba(199, 205, 212, 0.85);
        font-family: inherit;
        font-size: 12px;
        letter-spacing: 0.18em;
        cursor: pointer;
      }
      #report-sign-out:hover,
      #report-sign-out:focus-visible {
        background: rgba(199, 205, 212, 0.85);
        color: #12161c;
        outline: none;
      }

      /* The report arrives as a document, not a div: a paper settle, then
         sections revealing in order (delays set inline by ReportView from
         src/config/juice.ts). Reduced motion — the fresh-visitor default,
         or the OS asking — renders it complete and still. */
      #report.arriving .report-sheet {
        animation: report-arrive var(--report-arrive-ms, 380ms) cubic-bezier(0.2, 0.8, 0.3, 1) both;
      }
      #report.arriving .report-reveal {
        animation: report-reveal 240ms ease-out both;
        animation-delay: var(--reveal-delay, 0ms);
      }
      @keyframes report-arrive {
        from {
          transform: translateY(26px);
          opacity: 0;
        }
      }
      @keyframes report-reveal {
        from {
          opacity: 0;
        }
      }
      body.reduced-motion #report .report-sheet,
      body.reduced-motion #report .report-reveal {
        animation: none !important;
      }
      @media (prefers-reduced-motion: reduce) {
        #report .report-sheet,
        #report .report-reveal {
          animation: none !important;
        }
      }

      /* Phase 6: the kiosk, the pause lanyard, and settings — the same
         terminal-document family as the report. */
      .overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: flex-start;
        justify-content: center;
        overflow-y: auto;
        padding: 32px 16px;
        background: rgba(8, 10, 13, 0.94);
        font-family: 'IBM Plex Mono', monospace;
        color: var(--text, #c7cdd4);
        font-size: calc(13px * var(--hud-scale));
      }
      .overlay.visible {
        display: flex;
      }
      #kiosk {
        z-index: 110;
      }
      #pause {
        z-index: 105;
        background: rgba(8, 10, 13, 0.82);
      }
      #settings {
        z-index: 120;
      }
      .terminal-card {
        width: 100%;
        max-width: 680px;
        background: #12161c;
        border: 1px solid rgba(199, 205, 212, 0.18);
        border-top: 3px solid var(--amber, #ffb000);
        padding: 28px 32px 24px;
        line-height: 1.55;
      }
      .terminal-card h1 {
        margin: 0 0 2px;
        font-size: 1.2em;
        letter-spacing: 0.24em;
        color: var(--amber, #ffb000);
        font-weight: 600;
      }
      .kiosk-sub {
        color: rgba(199, 205, 212, 0.75);
        font-size: 0.92em;
      }
      .kiosk-dim {
        color: rgba(199, 205, 212, 0.5);
      }
      .kiosk-section-title {
        letter-spacing: 0.2em;
        font-size: 0.85em;
        color: rgba(199, 205, 212, 0.55);
        margin: 0 0 8px;
      }
      .kiosk-button {
        display: block;
        width: 100%;
        margin-top: 14px;
        padding: 12px 18px;
        background: transparent;
        border: 1px solid var(--amber, #ffb000);
        color: var(--amber, #ffb000);
        font-family: inherit;
        font-size: 1em;
        letter-spacing: 0.18em;
        cursor: pointer;
        text-align: center;
      }
      .kiosk-button:hover,
      .kiosk-button:focus-visible {
        background: var(--amber, #ffb000);
        color: #12161c;
        outline: none;
      }
      .kiosk-button-secondary {
        border-color: rgba(199, 205, 212, 0.45);
        color: rgba(199, 205, 212, 0.85);
      }
      .kiosk-button-secondary:hover,
      .kiosk-button-secondary:focus-visible {
        background: rgba(199, 205, 212, 0.85);
        color: #12161c;
      }
      .kiosk-button-danger {
        border-color: var(--alarm, #ff3b30);
        color: var(--alarm, #ff3b30);
      }
      .kiosk-button-danger:hover,
      .kiosk-button-danger:focus-visible {
        background: var(--alarm, #ff3b30);
        color: #12161c;
      }
      .kiosk-kv {
        display: flex;
        justify-content: space-between;
        max-width: 340px;
      }
      .kiosk-kv .k {
        color: rgba(199, 205, 212, 0.6);
      }
      .kiosk-history div {
        white-space: pre;
        font-size: 0.92em;
        color: rgba(199, 205, 212, 0.85);
      }
      .kiosk-controls-row {
        display: grid;
        grid-template-columns: 1.2fr 1fr 1fr;
        gap: 8px;
        font-size: 0.92em;
      }
      .kiosk-controls-header {
        color: rgba(199, 205, 212, 0.5);
        letter-spacing: 0.12em;
        font-size: 0.8em;
      }
      .pause-card {
        max-width: 420px;
        margin-top: 10vh;
        border-top-color: var(--text, #c7cdd4);
      }
      .settings-row {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 12px;
        align-items: center;
        margin: 12px 0;
        cursor: pointer;
      }
      .settings-row input[type='range'] {
        width: 160px;
        accent-color: var(--amber, #ffb000);
      }
      .settings-row input[type='checkbox'] {
        accent-color: var(--amber, #ffb000);
        width: 16px;
        height: 16px;
      }
      .settings-label-wide {
        grid-column: span 2;
      }
      .settings-value {
        min-width: 3.5em;
        text-align: right;
        color: rgba(199, 205, 212, 0.7);
      }

      /* High contrast: pure white text, harder borders, more opaque panels. */
      body.high-contrast #hud {
        color: #ffffff;
        text-shadow: 0 1px 3px #000;
      }
      body.high-contrast .terminal-card,
      body.high-contrast .report-sheet {
        background: #090b0e;
        border-color: #ffffff;
        color: #ffffff;
      }
      body.high-contrast .kiosk-sub,
      body.high-contrast .kiosk-dim,
      body.high-contrast .report-meta,
      body.high-contrast .settings-value {
        color: #e6e9ee;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"></div>
    <div id="suspicion"><div id="suspicion-fill"></div></div>
    <div id="detained-flash">DETAINED</div>
    <div id="report"><div id="report-sheet" class="report-sheet"></div></div>
    <div id="kiosk" class="overlay"><div id="kiosk-card" class="terminal-card"></div></div>
    <div id="settings" class="overlay"><div id="settings-card" class="terminal-card"></div></div>
    <div id="pause" class="overlay">
      <div class="terminal-card pause-card">
        <h1>ENGAGEMENT PAUSED</h1>
        <div class="kiosk-sub">Lanyard off. The night carries on without you.</div>
        <button id="pause-resume" class="kiosk-button">[ RESUME ]</button>
        <button id="pause-settings" class="kiosk-button kiosk-button-secondary">[ SETTINGS ]</button>
        <button id="pause-abandon" class="kiosk-button kiosk-button-danger">[ ABANDON ENGAGEMENT ]</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
